name: "publish"

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: setup bun
        uses: oven-sh/setup-bun@v2

      - name: install frontend dependencies
        run: bun install

      # Imports the self-signed code-signing certificate so the bundle is
      # Authenticode-signed and the app's sidecar verification is compiled in.
      # Without the secrets the build still succeeds, but unsigned and with
      # the verification disabled (see src-tauri/build.rs).
      - name: import signing certificate
        if: ${{ secrets.SIGNING_CERT_PFX_BASE64 != '' }}
        env:
          SIGNING_CERT_PFX_BASE64: ${{ secrets.SIGNING_CERT_PFX_BASE64 }}
          SIGNING_CERT_PFX_PASSWORD: ${{ secrets.SIGNING_CERT_PFX_PASSWORD }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "signing.pfx"
          [System.IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:SIGNING_CERT_PFX_BASE64))
          $password = ConvertTo-SecureString $env:SIGNING_CERT_PFX_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          Remove-Item $pfx
          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          $fingerprint = ([System.BitConverter]::ToString($sha256.ComputeHash($cert.RawData)) -replace "-", "").ToLowerInvariant()
          New-Item -ItemType Directory -Force src-tauri\signing | Out-Null
          Set-Content -Path src-tauri\signing\cert-fingerprint.txt -Value $fingerprint -NoNewline
          Write-Host "signing certificate imported; fingerprint $fingerprint"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: "App v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
